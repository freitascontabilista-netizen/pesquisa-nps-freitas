<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa NPS · Freitas Consultoria</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --ink:#152430;
    --ink-soft:#4c5d67;
    --navy:#0B2546;
    --navy-2:#123863;
    --paper:#F4F6F8;
    --paper-2:#FFFFFF;
    --gold:#0AC7CF;
    --line:#DCE2E8;
    --detractor:#B4483A;
    --passive:#D6A63A;
    --promoter:#00BF58;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .brand-header{
    width:100%;
    background:var(--navy);
    display:flex;
    justify-content:center;
    padding:34px 16px;
  }
  .brand-header img{
    height:88px;
    width:auto;
    display:block;
  }
  .wrap{width:100%;max-width:560px;padding:32px 16px 80px;}

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:30px;
    line-height:1.15;
    color:var(--navy);
    margin:0 0 8px;
  }
  .sub{
    color:var(--ink-soft);
    font-size:15px;
    line-height:1.5;
    margin:0 0 28px;
  }

  .card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 24px;
    margin-bottom:16px;
  }

  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--navy);
    margin-bottom:10px;
  }
  .hint{
    font-size:12px;
    color:var(--ink-soft);
    margin:-4px 0 14px;
  }

  .scale{
    display:grid;
    grid-template-columns:repeat(11,1fr);
    gap:5px;
    margin-bottom:8px;
  }
  .scale button{
    aspect-ratio:1/1;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--paper);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    transition:transform .12s ease, background .12s ease, color .12s ease, border-color .12s ease;
  }
  .scale button:hover{transform:translateY(-2px);}
  .scale button.selected{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
    transform:translateY(-2px);
  }
  .scale-labels{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:24px;
  }

  .field{margin-bottom:18px;}
  input[type=text], textarea{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
    resize:vertical;
  }
  textarea{min-height:88px;}
  input:focus, textarea:focus, .scale button:focus{
    outline:2px solid var(--navy-2);
    outline-offset:1px;
  }

  .submit{
    width:100%;
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:13px 16px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s ease;
  }
  .submit:hover{background:var(--navy-2);}
  .submit:disabled{background:#B7C0C6;cursor:not-allowed;}
  .required-note{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:10px;}

  .error-banner{
    background:#FBEAEA;
    border:1px solid var(--detractor);
    color:var(--detractor);
    font-size:12px;
    border-radius:8px;
    padding:10px 12px;
    margin-top:12px;
    display:none;
  }

  .thanks{
    text-align:center;
    padding:40px 20px;
  }
  .thanks .mark{
    font-family:'Fraunces',serif;
    font-size:44px;
    color:var(--gold);
    margin-bottom:4px;
  }
  .thanks h2{
    font-family:'Fraunces',serif;
    color:var(--navy);
    margin:8px 0 6px;
  }
  .thanks p{color:var(--ink-soft);font-size:14px;}

  .footer-link{
    text-align:center;
    margin-top:20px;
  }
  .footer-link button{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }

  /* Admin view */
  .admin-gate{
    display:flex;
    gap:8px;
  }
  .admin-gate input{flex:1;}
  .admin-gate button{
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:0 16px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .stat-row{
    display:flex;
    gap:12px;
    margin-bottom:20px;
  }
  .stat{
    flex:1;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 10px;
    text-align:center;
  }
  .stat .num{
    font-family:'Fraunces',serif;
    font-size:26px;
    color:var(--navy);
  }
  .stat .lbl{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .nps-big{
    text-align:center;
    padding:18px 0 24px;
    border-bottom:1px solid var(--line);
    margin-bottom:20px;
  }
  .nps-big .score{
    font-family:'Fraunces',serif;
    font-size:56px;
    color:var(--gold);
    line-height:1;
  }
  .nps-big .score-lbl{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--ink-soft);
    margin-top:6px;
  }
  .resp-item{
    border-bottom:1px solid var(--line);
    padding:12px 0;
  }
  .resp-item:last-child{border-bottom:none;}
  .resp-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:4px;
  }
  .badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    font-weight:600;
    padding:2px 8px;
    border-radius:20px;
    color:#fff;
  }
  .resp-meta{font-size:12px;color:var(--ink-soft);}
  .resp-comment{font-size:13px;color:var(--ink);margin-top:4px;}
  .empty-state{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    padding:24px 0;
  }

  /* Dashboard */
  .dash-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:22px;
  }
  .dash-head .sub{margin:0;}
  .refresh-btn{
    background:var(--paper-2);
    border:1px solid var(--line);
    color:var(--navy);
    font-size:12px;
    font-weight:600;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
  }
  .refresh-btn:hover{border-color:var(--navy);}

  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;
    margin-bottom:20px;
  }
  .kpi-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 16px;
    box-shadow:0 1px 3px rgba(11,37,70,.05);
  }
  .kpi-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    font-weight:600;
    margin-bottom:8px;
  }
  .kpi-value{
    font-family:'Fraunces',serif;
    font-size:32px;
    line-height:1;
    color:var(--navy);
  }
  .kpi-tag{
    display:inline-block;
    margin-top:10px;
    font-size:10px;
    font-weight:700;
    letter-spacing:.03em;
    padding:3px 9px;
    border-radius:20px;
    color:#fff;
  }
  .kpi-sub{font-size:11px;color:var(--ink-soft);margin-top:8px;}

  .dist-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 20px 18px;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(11,37,70,.05);
  }
  .dist-title{
    font-size:12px;
    font-weight:700;
    color:var(--navy);
    margin-bottom:14px;
  }
  .dist-bar{
    display:flex;
    height:12px;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:14px;
    background:var(--paper);
  }
  .dist-bar span{height:100%;transition:width .3s ease;}
  .dist-legend{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
  }
  .dist-legend-item{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
  .dist-legend-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dist-legend-item b{color:var(--ink);font-weight:700;}

  .filter-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    margin-bottom:14px;
    -ms-overflow-style:none;
    scrollbar-width:none;
  }
  .filter-tabs::-webkit-scrollbar{display:none;}
  .filter-tabs button{
    white-space:nowrap;
    background:var(--paper-2);
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
    transition:all .12s ease;
  }
  .filter-tabs button.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }

  .list-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:6px 20px;
    box-shadow:0 1px 3px rgba(11,37,70,.05);
  }
  .resp-card{
    padding:16px 0;
    border-bottom:1px solid var(--line);
  }
  .resp-card:last-child{border-bottom:none;}
  .resp-card-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    font-family:'IBM Plex Mono',monospace;
    color:#fff;
    flex-shrink:0;
  }
  .resp-card-id{flex:1;min-width:0;}
  .resp-card-name{font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .resp-card-company{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .resp-card-date{font-size:11px;color:var(--ink-soft);white-space:nowrap;flex-shrink:0;}
</style>
</head>

  const nomeInput = document.getElementById('nome');
  const empresaInput = document.getElementById('empresa');
  const advanceBtn = document.getElementById('advanceBtn');
  const note = document.querySelector('.required-note');

  function checkIdentify(){
    const ok = nomeInput.value.trim().length > 0 && empresaInput.value.trim().length > 0;
    advanceBtn.disabled = !ok;
    note.style.display = ok ? 'none' : 'block';
  }
  nomeInput.addEventListener('input', checkIdentify);
  empresaInput.addEventListener('input', checkIdentify);
  checkIdentify();

  advanceBtn.addEventListener('click', ()=>{
    respNome = nomeInput.value.trim();
    respEmpresa = empresaInput.value.trim();
    view = 'questions';
    render();
  });

  document.getElementById('gateLink').addEventListener('click', ()=>{ view='gate'; render(); });
}

function renderQuestions(){
  app.innerHTML = `
    <h1>Quase lá, ${respNome.split(' ')[0]}</h1>
    <p class="sub">Agora as perguntas sobre sua experiência com a ${respEmpresa}.</p>

    <div class="card">
      <label>De 0 a 10, qual a chance de você recomendar a Freitas Consultoria para outro empresário?</label>
      <div class="scale" id="scale">
        ${Array.from({length:11},(_,i)=>`<button type="button" data-v="${i}">${i}</button>`).join('')}
      </div>
      <div class="scale-labels"><span>Pouco provável</span><span>Muito provável</span></div>

      <div class="field">
        <label for="motivo">Por que essa nota? <span style="font-weight:400;color:var(--ink-soft);">(opcional)</span></label>
        <textarea id="motivo" placeholder="Ex.: prazo de entrega, clareza nas orientações, atendimento..."></textarea>
      </div>

      <div class="field">
        <label for="dor">Hoje, qual é a maior dor ou dificuldade da sua empresa que a gente poderia te ajudar a resolver? <span style="font-weight:400;color:var(--ink-soft);">(opcional)</span></label>
        <textarea id="dor" placeholder="Ex.: não sei se estou pagando imposto a mais, falta de tempo para organizar as finanças, dúvidas sobre abrir uma holding..."></textarea>
      </div>

      <div class="field">
        <label for="melhorar">Na sua opinião, o que podemos melhorar? <span style="font-weight:400;color:var(--ink-soft);">(opcional)</span></label>
        <textarea id="melhorar" placeholder="Ex.: mais agilidade nas respostas, explicações mais claras, mais contato proativo..."></textarea>
      </div>

      <button class="submit" id="submitBtn" disabled>Enviar avaliação</button>
      <p class="required-note">Selecione uma nota de 0 a 10 para enviar.</p>
      <div class="error-banner" id="errorBanner"></div>
    </div>

    <div class="footer-link"><button id="backBtn">voltar</button></div>
  `;

  document.querySelectorAll('#scale button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectedScore = parseInt(btn.dataset.v,10);
      document.querySelectorAll('#scale button').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      updateSubmitState();
    });
  });

  document.getElementById('submitBtn').addEventListener('click', submitResponse);
  document.getElementById('backBtn').addEventListener('click', ()=>{ view='identify'; render(); });
}

function updateSubmitState(){
  const ok = selectedScore !== null;
  document.getElementById('submitBtn').disabled = !ok;
  document.querySelector('.required-note').style.display = ok ? 'none' : 'block';
}

async function submitResponse(){
  if(selectedScore === null || !respNome || !respEmpresa) return;
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('errorBanner');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  errBox.style.display = 'none';

  const entry = {
    score: selectedScore,
    nome: respNome,
    empresa: respEmpresa,
    comentario: document.getElementById('motivo').value.trim() || null,
    dor: document.getElementById('dor').value.trim() || null,
    melhorar: document.getElementById('melhorar').value.trim() || null
  };

  const { error } = await sb.from('respostas_nps').insert(entry);

  if(error){
    console.error('Supabase error', error);
    btn.disabled = false;
    btn.textContent = 'Enviar avaliação';
    errBox.textContent = 'Não foi possível enviar agora. Tente novamente em instantes.';
    errBox.style.display = 'block';
    return;
  }

  view = 'thanks';
  render();
}

function renderThanks(){
  app.innerHTML = `
    <div class="card thanks">
      <div class="mark">✓</div>
      <h2>Obrigado pela avaliação</h2>
      <p>Sua resposta foi registrada. A equipe da Freitas Consultoria agradece o retorno.</p>
    </div>
  `;
}

function renderGate(){
  app.innerHTML = `
    <div class="eyebrow">Área restrita</div>
    <h1>Resultados da pesquisa</h1>
    <p class="sub">Acesso reservado à equipe do escritório.</p>
    <div class="card">
      <label for="pass">Código de acesso</label>
      <div class="admin-gate">
        <input type="text" id="pass" placeholder="Código">
        <button id="enterBtn">Entrar</button>
      </div>
      <p class="required-note" id="gateError" style="display:none;color:var(--detractor);">Código incorreto.</p>
    </div>
    <div class="footer-link"><button id="backLink">voltar ao formulário</button></div>
  `;
  document.getElementById('enterBtn').addEventListener('click', ()=>{
    const val = document.getElementById('pass').value;
    if(val === ADMIN_CODE){ view='admin'; render(); }
    else{ document.getElementById('gateError').style.display='block'; }
  });
  document.getElementById('pass').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') document.getElementById('enterBtn').click();
  });
  document.getElementById('backLink').addEventListener('click', ()=>{ view='identify'; render(); });
}

let adminEntries = [];
let adminFilter = 'all';

function initials(name){
  if(!name) return '?';
  const parts = name.trim().split(/\s+/);
  const first = parts[0]?.[0] || '';
  const last = parts.length > 1 ? parts[parts.length-1][0] : '';
  return (first + last).toUpperCase();
}

function npsZone(nps){
  if(nps >= 75) return {label:'Excelente', color:'var(--promoter)'};
  if(nps >= 50) return {label:'Muito bom', color:'#3FA34D'};
  if(nps >= 0) return {label:'Razoável', color:'var(--passive)'};
  return {label:'Crítico', color:'var(--detractor)'};
}

function suggestAction(e){
  const text = [e.comment, e.dor, e.melhorar].filter(Boolean).join(' ').toLowerCase();

  if(!text.trim()){
    return 'Sem detalhes registrados. Ligue para entender o motivo da nota antes de qualquer outra ação.';
  }
  if(/prazo|atras|demora|lent|agilidade/.test(text)){
    return 'Cliente sente falta de agilidade. Ligue em até 48h explicando o motivo do atraso e combine um novo prazo.';
  }
  if(/imposto|tribut|carga tribut|simples nacional|lucro presumido|lucro real/.test(text)){
    return 'Oportunidade de consultoria tributária. Agende uma reunião para revisar o enquadramento e mostrar economia possível.';
  }
  if(/whatsapp|retorno|resposta|comunica|contato/.test(text)){
    return 'Cliente sente falta de retorno. Alinhe um canal e prazo padrão de resposta com ele.';
  }
  if(/declara|multa|exclus|pendênc|pendenc|risco/.test(text)){
    return 'Possível risco fiscal. Verifique pendências imediatamente e explique o plano de regularização.';
  }
  if(/preço|preco|valor|caro|mensalidade/.test(text)){
    return 'Questão de preço/valor percebido. Ligue para reforçar o que está incluso no serviço e ouvir a expectativa dele.';
  }
  return 'Ligue para aprofundar o feedback e propor uma solução concreta com prazo definido.';
}

async function renderAdmin(){
  app.innerHTML = `
    <h1>Painel de resultados</h1>
    <p class="sub">Carregando respostas...</p>
  `;

  const { data, error } = await sb
    .from('respostas_nps')
    .select('*')
    .order('created_at', { ascending: false });

  if(error) console.error('Fetch error', error);

  adminEntries = (data || []).map(r => ({
    score: r.score,
    nome: r.nome,
    empresa: r.empresa,
    comment: r.comentario,
    dor: r.dor,
    melhorar: r.melhorar,
    date: r.created_at
  }));

  adminFilter = 'all';
  drawAdminDashboard();
}

function drawAdminDashboard(){
  const entries = adminEntries;
  const total = entries.length;
  const promoters = entries.filter(e=>e.score>=9).length;
  const passives = entries.filter(e=>e.score>=7 && e.score<=8).length;
  const detractors = entries.filter(e=>e.score<=6).length;
  const nps = total ? Math.round(((promoters - detractors) / total) * 100) : 0;
  const comOportunidade = entries.filter(e=>e.dor).length;
  const zone = npsZone(nps);

  const pPct = total ? Math.round(promoters/total*100) : 0;
  const passPct = total ? Math.round(passives/total*100) : 0;
  const dPct = total ? Math.max(0, 100 - pPct - passPct) : 0;

  const filters = [
    {key:'all', label:`Todas (${total})`},
    {key:'promoter', label:`Promotores (${promoters})`},
    {key:'passive', label:`Neutros (${passives})`},
    {key:'detractor', label:`Detratores (${detractors})`},
    {key:'dor', label:`Com dor relatada (${comOportunidade})`},
  ];

  const filtered = entries.filter(e=>{
    if(adminFilter==='all') return true;
    if(adminFilter==='promoter') return e.score>=9;
    if(adminFilter==='passive') return e.score>=7 && e.score<=8;
    if(adminFilter==='detractor') return e.score<=6;
    if(adminFilter==='dor') return !!e.dor;
    return true;
  });

  app.innerHTML = `
    <div class="dash-head">
      <div>
        <h1 style="margin-bottom:2px;">Painel de resultados</h1>
        <p class="sub" style="margin-bottom:0;">${total} resposta${total===1?'':'s'} recebida${total===1?'':'s'} ao todo.</p>
      </div>
      <button class="refresh-btn" id="refreshBtn">↻ Atualizar</button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">NPS Geral</div>
        <div class="kpi-value" style="color:${total?zone.color:'var(--ink-soft)'};">${total ? nps : '—'}</div>
        ${total ? `<span class="kpi-tag" style="background:${zone.color};">${zone.label}</span>` : ''}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Promotores</div>
        <div class="kpi-value" style="color:var(--promoter);">${pPct}%</div>
        <div class="kpi-sub">${promoters} de ${total} respostas</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Detratores</div>
        <div class="kpi-value" style="color:var(--detractor);">${dPct}%</div>
        <div class="kpi-sub">${detractors} de ${total} respostas</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Oportunidades</div>
        <div class="kpi-value" style="color:var(--gold);">${comOportunidade}</div>
        <div class="kpi-sub">dores relatadas p/ ajudar</div>
      </div>
    </div>

    <div class="dist-card">
      <div class="dist-title">Distribuição das respostas</div>
      <div class="dist-bar">
        ${pPct>0?`<span style="width:${pPct}%;background:var(--promoter);"></span>`:''}
        ${passPct>0?`<span style="width:${passPct}%;background:var(--passive);"></span>`:''}
        ${dPct>0?`<span style="width:${dPct}%;background:var(--detractor);"></span>`:''}
      </div>
      <div class="dist-legend">
        <div class="dist-legend-item"><span class="dot" style="background:var(--promoter);"></span>Promotores (9-10) <b>${pPct}%</b></div>
        <div class="dist-legend-item"><span class="dot" style="background:var(--passive);"></span>Neutros (7-8) <b>${passPct}%</b></div>
        <div class="dist-legend-item"><span class="dot" style="background:var(--detractor);"></span>Detratores (0-6) <b>${dPct}%</b></div>
      </div>
    </div>

    ${detractors > 0 ? `
    <div class="dist-card" style="border-left:4px solid var(--detractor);">
      <div class="dist-title" style="color:var(--detractor);">Como agir com os detratores</div>
      <ol style="margin:0;padding-left:18px;font-size:13px;color:var(--ink);line-height:1.7;">
        <li><strong>Contate em até 48h</strong> — quanto mais rápido, maior a chance de reverter a percepção.</li>
        <li><strong>Ouça sem se defender</strong> — agradeça o feedback antes de explicar o que houve.</li>
        <li><strong>Proponha uma solução concreta</strong> com prazo definido, não apenas uma desculpa.</li>
        <li><strong>Registre o retorno</strong> e reavalie com o cliente em ~30 dias.</li>
      </ol>
    </div>` : ''}

    <div class="filter-tabs" id="filterTabs">
      ${filters.map(f => `<button data-filter="${f.key}" class="${adminFilter===f.key?'active':''}">${f.label}</button>`).join('')}
    </div>

    <div class="list-card">
      ${filtered.length===0 ? '<div class="empty-state">Nenhuma resposta nesse filtro.</div>' : filtered.map(e=>{
        const l = scaleLabel(e.score);
        const d = new Date(e.date);
        const dateStr = d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'}) + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        return `<div class="resp-card">
          <div class="resp-card-head">
            <div class="avatar" style="background:${l.color};">${initials(e.nome)}</div>
            <div class="resp-card-id">
              <div class="resp-card-name">${e.nome || 'Sem nome'}</div>
              <div class="resp-card-company">${e.empresa || ''}</div>
            </div>
            <span class="badge" style="background:${l.color};flex-shrink:0;">${e.score} · ${l.text}</span>
          </div>
          <div class="resp-card-date" style="margin-bottom:${e.comment||e.dor||e.melhorar?'8px':'0'};">${dateStr}</div>
          ${e.comment ? `<div class="resp-comment">"${e.comment}"</div>` : ''}
          ${e.dor ? `<div class="resp-comment" style="margin-top:6px;padding:8px 10px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;"><strong style="color:var(--gold);">Dor relatada:</strong> ${e.dor}</div>` : ''}
          ${e.melhorar ? `<div class="resp-comment" style="margin-top:6px;padding:8px 10px;background:var(--paper);border-left:3px solid var(--navy-2);border-radius:4px;"><strong style="color:var(--navy-2);">Sugestão de melhoria:</strong> ${e.melhorar}</div>` : ''}
          ${e.score<=6 ? `<div class="resp-comment" style="margin-top:6px;padding:8px 10px;background:#FBEAEA;border-left:3px solid var(--detractor);border-radius:4px;"><strong style="color:var(--detractor);">Ação recomendada:</strong> ${suggestAction(e)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>

    <div class="footer-link"><button id="backLink">voltar ao formulário</button></div>
  `;

  document.getElementById('refreshBtn').addEventListener('click', renderAdmin);
  document.querySelectorAll('#filterTabs button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      adminFilter = btn.dataset.filter;
      drawAdminDashboard();
    });
  });
  document.getElementById('backLink').addEventListener('click', ()=>{ view='identify'; render(); });
}

function render(){
  app.style.maxWidth = (view==='admin') ? '900px' : '560px';
  if(view==='identify') renderIdentify();
  else if(view==='questions') renderQuestions();
  else if(view==='thanks') renderThanks();
  else if(view==='gate') renderGate();
  else if(view==='admin') renderAdmin();
}

render();
</script>
</body>
</html>
